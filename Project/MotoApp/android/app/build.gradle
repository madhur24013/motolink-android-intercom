apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

import java.util.Properties

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("keystore.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def releaseConfigProperties = new Properties()
def releaseConfigFile = rootProject.file("release-config.properties")
if (releaseConfigFile.exists()) {
    releaseConfigProperties.load(new FileInputStream(releaseConfigFile))
}

def releaseStoreFile = keystoreProperties.getProperty("storeFile") ?: System.getenv("MOTOLINK_RELEASE_STORE_FILE")
def releaseStorePassword = keystoreProperties.getProperty("storePassword") ?: System.getenv("MOTOLINK_RELEASE_STORE_PASSWORD")
def releaseKeyAlias = keystoreProperties.getProperty("keyAlias") ?: System.getenv("MOTOLINK_RELEASE_KEY_ALIAS")
def releaseKeyPassword = keystoreProperties.getProperty("keyPassword") ?: System.getenv("MOTOLINK_RELEASE_KEY_PASSWORD")
def hasReleaseSigning = releaseStoreFile && releaseStorePassword && releaseKeyAlias && releaseKeyPassword
def resolveReleaseStoreFile = { pathValue ->
    if (!pathValue) {
        return null
    }

    def candidate = new File(pathValue)
    return candidate.isAbsolute() ? candidate : rootProject.file(pathValue)
}
def releaseConfigValue = { propertyName, envName ->
    return (
        project.findProperty(envName)
            ?: releaseConfigProperties.getProperty(propertyName)
            ?: System.getenv(envName)
            ?: ""
    ).trim()
}
def turnUrls = releaseConfigValue("turnUrls", "MOTOLINK_TURN_URLS")
def turnUsername = releaseConfigValue("turnUsername", "MOTOLINK_TURN_USERNAME")
def turnCredential = releaseConfigValue("turnCredential", "MOTOLINK_TURN_CREDENTIAL")
def supportEmail = releaseConfigValue("supportEmail", "MOTOLINK_SUPPORT_EMAIL")
def privacyPolicyUrl = releaseConfigValue("privacyPolicyUrl", "MOTOLINK_PRIVACY_POLICY_URL")
def hasTurnConfig = turnUrls && turnUsername && turnCredential
def containsPlaceholder = { value ->
    def normalized = (value ?: "").toLowerCase()
    return normalized.contains("replace-with") ||
        normalized.contains("yourdomain.com") ||
        normalized.contains("example.com") ||
        normalized.contains("todo")
}
def isValidSupportEmail = { value ->
    return (value ?: "") ==~ /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/
}
def isValidPrivacyUrl = { value ->
    def normalized = (value ?: "").trim()
    return normalized.startsWith("https://")
}
def escapeBuildConfigString = { value ->
    def safe = (value ?: "").replace("\\", "\\\\").replace("\"", "\\\"")
    return "\"${safe}\""
}

configurations.all {
    resolutionStrategy {
        force "androidx.core:core:1.12.0"
        force "androidx.core:core-ktx:1.12.0"
    }
}

react {
}

def enableProguardInReleaseBuilds = false
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.motolinkbase"
    defaultConfig {
        applicationId "com.motolinkbase"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 2
        versionName "2.0.0"
        buildConfigField "String", "MOTOLINK_TURN_URLS", escapeBuildConfigString(turnUrls)
        buildConfigField "String", "MOTOLINK_TURN_USERNAME", escapeBuildConfigString(turnUsername)
        buildConfigField "String", "MOTOLINK_TURN_CREDENTIAL", escapeBuildConfigString(turnCredential)
        buildConfigField "String", "MOTOLINK_SUPPORT_EMAIL", escapeBuildConfigString(supportEmail)
        buildConfigField "String", "MOTOLINK_PRIVACY_POLICY_URL", escapeBuildConfigString(privacyPolicyUrl)
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (hasReleaseSigning) {
                storeFile resolveReleaseStoreFile(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig hasReleaseSigning ? signingConfigs.release : signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

gradle.taskGraph.whenReady { graph ->
    def isReleaseTask = graph.allTasks.any { task ->
        def name = task.name.toLowerCase()
        name.contains("release")
    }

    if (isReleaseTask && !hasReleaseSigning) {
        throw new GradleException(
            "Release signing is not configured. Create android/keystore.properties " +
            "or set MOTOLINK_RELEASE_STORE_FILE, MOTOLINK_RELEASE_STORE_PASSWORD, " +
            "MOTOLINK_RELEASE_KEY_ALIAS, and MOTOLINK_RELEASE_KEY_PASSWORD."
        )
    }

    if (isReleaseTask && !hasTurnConfig) {
        throw new GradleException(
            "TURN is required for release builds. Set MOTOLINK_TURN_URLS, " +
            "MOTOLINK_TURN_USERNAME, and MOTOLINK_TURN_CREDENTIAL (or android/release-config.properties)."
        )
    }

    if (isReleaseTask && (containsPlaceholder(turnUrls) || containsPlaceholder(turnUsername) || containsPlaceholder(turnCredential))) {
        throw new GradleException(
            "Release TURN config contains placeholder values. Use real production TURN credentials before publishing."
        )
    }

    if (isReleaseTask && !isValidSupportEmail(supportEmail)) {
        throw new GradleException(
            "Release supportEmail is missing or invalid. Set MOTOLINK_SUPPORT_EMAIL (or android/release-config.properties)."
        )
    }

    if (isReleaseTask && !isValidPrivacyUrl(privacyPolicyUrl)) {
        throw new GradleException(
            "Release privacyPolicyUrl must be a public HTTPS URL. Set MOTOLINK_PRIVACY_POLICY_URL (or android/release-config.properties)."
        )
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:flipper-integration")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesAppBuildGradle(project)
